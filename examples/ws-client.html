<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Claude Code Bridge — WS test client</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #161a22;
        --panel-2: #1d222c;
        --border: #2a3140;
        --text: #e6e8ee;
        --muted: #8b93a7;
        --accent: #6ea8ff;
        --good: #58d68d;
        --good-alt: #d658b9;
        --bad: #ff7b7b;
        --warn: #f0c000;
        --tool: #c792ea;
        --hook: #82aaff;
      }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 1100px;
        margin: 1em auto;
        padding: 0 1em;
        background: var(--bg);
        color: var(--text);
      }
      h1 { font-size: 1.2em; margin: 0.5em 0; }
      h3 { margin: 1em 0 0.4em; color: var(--muted); font-weight: 600; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em; }
      input, button, textarea, select {
        font: inherit;
        padding: 0.45em 0.7em;
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      button { cursor: pointer; }
      button:hover:not(:disabled) { background: var(--panel-2); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      input[type=text], input[type=password] { flex: 1; min-width: 0; }
      .row { display: flex; gap: 0.5em; margin: 0.5em 0; align-items: center; flex-wrap: wrap; }
      .status { font-size: 0.85em; color: var(--muted); }
      .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--bad); margin-right: 0.4em; vertical-align: middle; }
      .status.connected .dot { background: var(--good); }

      #timeline {
        height: 60vh;
        overflow-y: auto;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.5em;
      }
      .event {
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-left: 3px solid var(--muted);
        border-radius: 4px;
        margin: 0.4em 0;
        padding: 0.5em 0.7em;
        font-size: 0.9em;
      }
      .event .meta { display: flex; justify-content: space-between; color: var(--muted); font-size: 0.75em; margin-bottom: 0.25em; }
      .event .type { font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; font-size: 0.7em; }
      .event .body { white-space: pre-wrap; word-break: break-word; }
      .event code, .event .kv {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.85em;
        background: rgba(255,255,255,0.06);
        padding: 0 0.3em;
        border-radius: 3px;
      }
      .event details { margin-top: 0.4em; }
      .event summary { cursor: pointer; color: var(--muted); font-size: 0.75em; user-select: none; }
      .event pre { margin: 0.3em 0 0; padding: 0.5em; background: #0b0d12; border-radius: 3px; overflow-x: auto; font-size: 0.8em; line-height: 1.4; }
      .event .kvs { display: grid; grid-template-columns: auto 1fr; gap: 0.2em 0.6em; margin-top: 0.3em; font-size: 0.85em; }
      .event .kvs .k { color: var(--muted); }

      .ev-inbound { border-left-color: var(--accent); }
      .ev-inbound .type { color: var(--accent); }
      .ev-outbound { border-left-color: var(--good); }
      .ev-outbound .type { color: var(--good); }
      .ev-session { border-left-color: var(--muted); }
      .ev-hook { border-left-color: var(--hook); }
      .ev-hook .type { color: var(--hook); }
      .ev-user { border-left-color: var(--good-alt); }
      .ev-user .type { color: var(--good-alt); }
      .ev-user .body { white-space: pre-wrap; }
      .ev-assistant { border-left-color: var(--good); }
      .ev-assistant .type { color: var(--good); }
      .ev-assistant .body { white-space: pre-wrap; }
      .ev-permission { border-left-color: var(--warn); background: #2a2410; }
      .ev-permission .type { color: var(--warn); }
      .ev-resolved { border-left-color: var(--muted); opacity: 0.75; }
      .ev-error { border-left-color: var(--bad); }
      .ev-error .type { color: var(--bad); }
      .ev-system { border-left-color: var(--muted); font-size: 0.8em; color: var(--muted); }

      .perm-actions { margin-top: 0.5em; display: flex; gap: 0.4em; }
      .perm-actions button.allow { background: #1f3d2b; border-color: var(--good); color: var(--good); }
      .perm-actions button.deny { background: #3d1f1f; border-color: var(--bad); color: var(--bad); }
      .perm-actions button:disabled { background: var(--panel); color: var(--muted); border-color: var(--border); }

      .tool-name { color: var(--tool); font-weight: 600; }
      .badge { display: inline-block; padding: 0.1em 0.5em; border-radius: 10px; font-size: 0.75em; background: rgba(255,255,255,0.08); color: var(--muted); margin-left: 0.3em; }

      .controls { display: flex; gap: 0.5em; align-items: center; font-size: 0.85em; color: var(--muted); }
      .controls label { display: flex; align-items: center; gap: 0.3em; }
    </style>
  </head>
  <body>
    <h1>Claude Code Bridge — test client</h1>

    <div class="row">
      <input id="url" type="text" value="ws://127.0.0.1:8787/ws" />
      <input id="token" type="password" placeholder="BRIDGE_TOKEN" />
      <button id="connect">Connect</button>
      <button id="disconnect" disabled>Disconnect</button>
      <span id="status" class="status"><span class="dot"></span><span id="statusText">disconnected</span></span>
    </div>

    <div class="row">
      <input id="chat_id" type="text" placeholder="chat_id (optional)" style="max-width: 220px;" />
      <input id="content" type="text" placeholder="Message to send" />
      <button id="send" disabled>Send</button>
    </div>

    <div class="row controls">
      <label><input type="checkbox" id="showRaw" /> show raw JSON</label>
      <label><input type="checkbox" id="showEvents" checked /> show agent events</label>
      <label><input type="checkbox" id="autoscroll" checked /> auto-scroll</label>
      <button id="clear">Clear</button>
    </div>

    <h3>Timeline</h3>
    <div id="timeline"></div>

    <script>
      const $ = (id) => document.getElementById(id)
      const tl = $('timeline')
      let ws = null

      const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))
      const ts = (t) => new Date(t || Date.now()).toLocaleTimeString()

      function addEvent({ cls, type, time, title, body, kvs, raw, id }) {
        const div = document.createElement('div')
        div.className = `event ${cls}`
        if (id) div.id = id
        const metaHtml = `<div class="meta"><span class="type">${esc(type)}</span><span>${esc(ts(time))}</span></div>`
        const titleHtml = title ? `<div><strong>${title}</strong></div>` : ''
        const bodyHtml = body ? `<div class="body">${body}</div>` : ''
        let kvsHtml = ''
        if (kvs && kvs.length) {
          kvsHtml = '<div class="kvs">' + kvs.map(([k, v]) => `<div class="k">${esc(k)}</div><div>${v}</div>`).join('') + '</div>'
        }
        const rawHtml = raw ? `<details><summary>raw</summary><pre>${esc(JSON.stringify(raw, null, 2))}</pre></details>` : ''
        div.innerHTML = metaHtml + titleHtml + bodyHtml + kvsHtml + rawHtml
        if (!$('showRaw').checked && raw) div.querySelector('details').style.display = 'none'
        tl.appendChild(div)
        if ($('autoscroll').checked) tl.scrollTop = tl.scrollHeight
        return div
      }

      function sysLine(text) {
        addEvent({ cls: 'ev-system', type: 'system', time: Date.now(), body: esc(text) })
      }

      function renderMeta(meta) {
        if (!meta || typeof meta !== 'object') return ''
        const entries = Object.entries(meta)
        if (!entries.length) return ''
        return entries.map(([k, v]) => `<span class="badge">${esc(k)}=${esc(v)}</span>`).join('')
      }

      function truncate(s, n = 400) {
        s = String(s || '')
        return s.length > n ? s.slice(0, n) + '…' : s
      }

      function handleMessage(msg) {
        const raw = msg
        switch (msg.type) {
          case 'hello':
            sysLine(`connected — client_id=${msg.client_id}, server v${msg.server_version}`)
            break
          case 'pong':
            sysLine('pong')
            break
          case 'inbound_message':
            addEvent({
              cls: 'ev-inbound', type: 'inbound', time: Date.now(),
              title: `→ ${esc(truncate(msg.content, 200))}`,
              kvs: [
                ['chat_id', `<code>${esc(msg.chat_id)}</code>`],
                ['client', `<code>${esc(msg.client_id)}</code>`],
                ...(msg.meta && Object.keys(msg.meta).length ? [['meta', renderMeta(msg.meta)]] : []),
              ],
              raw,
            })
            break
          case 'outbound_reply':
            addEvent({
              cls: 'ev-outbound', type: 'reply', time: Date.now(),
              title: `← ${esc(truncate(msg.content, 400))}`,
              kvs: [['chat_id', `<code>${esc(msg.chat_id)}</code>`]],
              raw,
            })
            break
          case 'session_event':
            addEvent({
              cls: 'ev-session', type: 'session', time: Date.now(),
              body: `session ${esc(msg.event)}`,
              raw,
            })
            break
          case 'permission_request':
            renderPermission(msg)
            break
          case 'permission_resolved':
            resolvePermission(msg)
            break
          case 'agent_event':
            if (!$('showEvents').checked) return
            renderAgentEvent(msg)
            break
          case 'error':
            addEvent({ cls: 'ev-error', type: 'error', time: Date.now(), body: esc(msg.message || ''), raw })
            break
          default:
            addEvent({ cls: 'ev-system', type: msg.type || 'unknown', time: Date.now(), body: '', raw })
        }
      }

      function renderPermission(p) {
        const id = `perm-${p.request_id}`
        if (document.getElementById(id)) return
        const tool = p.activity?.tool || ''
        const summary = p.activity?.summary || ''
        const el = addEvent({
          id,
          cls: 'ev-permission', type: 'permission requested', time: Date.now(),
          title: `<span class="tool-name">${esc(tool)}</span> <code>${esc(p.request_id)}</code>`,
          body: [p.description ? `<em>${esc(p.description)}</em>` : '', summary ? `<code>${esc(summary)}</code>` : ''].filter(Boolean).join(' '),
          kvs: p.activity?.kind ? [['kind', `<code>${esc(p.activity.kind)}</code>`]] : [],
          raw: p,
        })
        const actions = document.createElement('div')
        actions.className = 'perm-actions'
        actions.innerHTML = `
          <button class="allow" data-behavior="allow">Allow</button>
          <button class="deny" data-behavior="deny">Deny</button>
        `
        actions.querySelectorAll('button').forEach((btn) => {
          btn.addEventListener('click', () => {
            ws && ws.send(JSON.stringify({ type: 'permission_verdict', request_id: p.request_id, behavior: btn.dataset.behavior }))
            actions.querySelectorAll('button').forEach((b) => (b.disabled = true))
            btn.textContent = `${btn.dataset.behavior} sent…`
          })
        })
        el.appendChild(actions)
      }

      function resolvePermission(msg) {
        const el = document.getElementById(`perm-${msg.request_id}`)
        if (el) {
          el.classList.remove('ev-permission')
          el.classList.add('ev-resolved')
          const type = el.querySelector('.type')
          if (type) type.textContent = `permission ${msg.behavior} (by ${msg.by})`
          const actions = el.querySelector('.perm-actions')
          if (actions) actions.remove()
        } else {
          addEvent({
            cls: 'ev-resolved', type: `permission ${esc(msg.behavior)}`, time: Date.now(),
            body: `request <code>${esc(msg.request_id)}</code> resolved by ${esc(msg.by)}`,
            raw: msg,
          })
        }
      }

      function renderAgentEvent(msg) {
        const ev = msg.event || {}
        const kind = ev.kind || 'unknown'
        const kvs = []
        const kv = (k, v) => v != null && v !== '' && kvs.push([k, `<code>${esc(v)}</code>`])
        kv('agent', msg.agent)
        kv('session', msg.session_id)
        kv('turn', msg.turn_id)

        let cls = 'ev-hook'
        let title = ''
        let body = ''

        switch (kind) {
          case 'message.user':
            cls = 'ev-user'
            body = esc(ev.text || '')
            break
          case 'message.assistant':
            cls = 'ev-assistant'
            body = esc(truncate(ev.text || '', 1000))
            if (ev.final) kv('final', 'true')
            break
          case 'thinking':
            cls = 'ev-system'
            body = '<em>' + esc(truncate(ev.text || '', 600)) + '</em>'
            break
          case 'turn.started':
            cls = 'ev-user'
            if (ev.prompt) body = esc(truncate(ev.prompt, 400))
            break
          case 'turn.ended':
            cls = 'ev-session'
            if (ev.cause) kv('cause', ev.cause)
            if (ev.last_assistant_text) kvs.push(['last', `<pre>${esc(truncate(ev.last_assistant_text, 400))}</pre>`])
            break
          case 'session.started':
          case 'session.ended':
            cls = 'ev-session'
            if (ev.cause) kv('cause', ev.cause)
            break
          case 'activity.started':
          case 'activity.finished':
          case 'activity.failed':
            title = `<span class="tool-name">${esc(ev.activity?.tool || '')}</span> <span class="badge">${esc(ev.activity?.kind || '')}</span>`
            if (ev.activity?.summary) body = `<code>${esc(ev.activity.summary)}</code>`
            if (ev.activity?.id) kv('id', ev.activity.id)
            if (ev.duration_ms != null) kv('duration_ms', ev.duration_ms)
            if (ev.error_message) kvs.push(['error', `<pre>${esc(truncate(ev.error_message, 400))}</pre>`])
            if (kind === 'activity.failed') cls = 'ev-error'
            break
          case 'permission.requested':
            // Handled by renderPermission via the legacy permission_request frame.
            cls = 'ev-permission'
            title = `<code>${esc(ev.request_id)}</code>`
            if (ev.activity) body = `<span class="tool-name">${esc(ev.activity.tool)}</span> ${esc(ev.activity.summary || '')}`
            if (ev.description) body += ` <em>${esc(ev.description)}</em>`
            break
          case 'permission.resolved':
            cls = 'ev-resolved'
            kv('decision', ev.decision)
            if (ev.scope) kv('scope', ev.scope)
            break
          case 'todo.updated': {
            const items = Array.isArray(ev.items) ? ev.items : []
            body = '<pre>' + esc(items.map((t) => `[${t.status[0]}] ${t.text}`).join('\n')) + '</pre>'
            break
          }
          case 'subagent.started':
          case 'subagent.finished':
            kv('subagent_id', ev.subagent_id)
            if (ev.subagent_type) kv('type', ev.subagent_type)
            if (ev.task) body = esc(truncate(ev.task, 400))
            break
          case 'agent.question':
            cls = 'ev-permission'
            body = `<strong>${esc(ev.text || '')}</strong>`
            if (Array.isArray(ev.options) && ev.options.length) {
              kvs.push(['options', ev.options.map((o) => `<code>${esc(o)}</code>`).join(' ')])
            }
            break
          case 'context.compacting':
            cls = 'ev-session'
            if (ev.trigger) kv('trigger', ev.trigger)
            if (ev.context_usage_percent != null) kv('usage', `${ev.context_usage_percent}%`)
            break
          case 'notification':
            cls = 'ev-system'
            body = esc(ev.text || '')
            break
        }

        addEvent({
          cls, type: `${esc(msg.agent)} · ${esc(kind)}`, time: msg.ts,
          title, body, kvs, raw: msg,
        })
      }

      function setConnected(connected) {
        $('connect').disabled = connected
        $('disconnect').disabled = !connected
        $('send').disabled = !connected
        const s = $('status')
        s.classList.toggle('connected', connected)
        $('statusText').textContent = connected ? 'connected' : 'disconnected'
      }

      $('connect').addEventListener('click', () => {
        const url = `${$('url').value}?token=${encodeURIComponent($('token').value)}`
        try { ws = new WebSocket(url) } catch (e) { sysLine('bad url: ' + e.message); return }
        ws.addEventListener('open', () => setConnected(true))
        ws.addEventListener('close', (ev) => {
          setConnected(false)
          sysLine(`closed code=${ev.code}${ev.reason ? ' reason=' + ev.reason : ''}`)
        })
        ws.addEventListener('error', () => sysLine('socket error'))
        ws.addEventListener('message', (ev) => {
          let msg
          try { msg = JSON.parse(ev.data) } catch { sysLine('non-json: ' + ev.data); return }
          handleMessage(msg)
        })
      })

      $('disconnect').addEventListener('click', () => ws && ws.close())

      $('send').addEventListener('click', () => {
        if (!ws) return
        const payload = { type: 'send_message', content: $('content').value }
        const cid = $('chat_id').value
        if (cid) payload.chat_id = cid
        ws.send(JSON.stringify(payload))
        $('content').value = ''
      })
      $('content').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('send').click() })

      $('showRaw').addEventListener('change', () => {
        tl.querySelectorAll('details').forEach((d) => { d.style.display = $('showRaw').checked ? '' : 'none' })
      })

      $('clear').addEventListener('click', () => { tl.innerHTML = '' })
    </script>
  </body>
</html>
