<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Robot Display Mode Control</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1d222c;
      --border: #2a3140;
      --text: #e6e8ee;
      --muted: #8b93a7;
      --accent: #6ea8ff;
      --good: #58d68d;
      --bad: #ff7b7b;
      --warn: #f0c000;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 900px;
      margin: 1em auto;
      padding: 0 1em;
      background: var(--bg);
      color: var(--text);
    }
    h1 {
      font-size: 1.2em;
      margin: 0.5em 0;
    }
    h3 {
      margin: 1em 0 0.4em;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input, button {
      font: inherit;
      padding: 0.45em 0.7em;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    button { cursor: pointer; }
    button:hover:not(:disabled) { background: var(--panel-2); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    input[type="text"] { flex: 1; min-width: 0; }
    .row {
      display: flex;
      gap: 0.5em;
      margin: 0.5em 0;
      align-items: center;
      flex-wrap: wrap;
    }
    .status {
      font-size: 0.85em;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
    }
    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--bad);
    }
    .status.connected .dot { background: var(--good); }
    .btn-face { border-color: var(--accent); }
    .btn-text { border-color: var(--warn); }
    #dropZone {
      flex: 1;
      min-height: 3em;
      padding: 0.7em 1em;
      border: 2px dashed var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      user-select: none;
    }
    #dropZone:hover { border-color: var(--accent); color: var(--text); }
    #dropZone.dragging {
      border-color: var(--accent);
      background: var(--panel-2);
      color: var(--text);
    }
    #dropZone.loaded { border-style: solid; border-color: var(--good); color: var(--text); }
    #logFile { display: none; }
    #log {
      height: 50vh;
      overflow-y: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75em;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.86em;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Display Mode Control</h1>
  <div class="row">
    <input id="wsUrl" type="text" value="ws://localhost:8787/ws?token=dev-token" />
    <button id="connectBtn">Connect</button>
    <span id="status" class="status"><span class="dot"></span><span id="statusText">disconnected</span></span>
  </div>
  <div class="row">
    <button id="faceBtn" class="btn-face" disabled>Face Mode</button>
    <button id="textBtn" class="btn-text" disabled>Text Mode</button>
  </div>
  <h3>Session Context</h3>
  <div class="row">
    <input id="sessionIdInput" type="text" value="simulator" />
    <input id="turnIdInput" type="text" value="turn_1" />
  </div>
  <h3>Lifecycle Controls</h3>
  <div class="row">
    <button id="sessionToggleBtn" disabled>Session Start</button>
    <button id="turnToggleBtn" disabled>Turn Start</button>
  </div>
  <h3>Activity Controls</h3>
  <div class="row">
    <button id="readToggleBtn" disabled>Start Read</button>
    <button id="writeToggleBtn" disabled>Start Write</button>
    <button id="executeToggleBtn" disabled>Start Execute</button>
  </div>
  <h3>Replay Log File</h3>
  <div class="row">
    <div id="dropZone">Drop a log file here, or click to choose</div>
    <input id="logFile" type="file" accept=".log,.jsonl,.txt" />
  </div>
  <div class="row">
    <label class="status"><input id="speedInput" type="number" min="0.1" step="0.1" value="1" style="width:5em" /> &times; speed</label>
    <button id="playLogBtn" disabled>Play Log</button>
    <button id="stopLogBtn" disabled>Stop Replay</button>
  </div>
  <h3>Log</h3>
  <div id="log"></div>

  <script>
    let ws = null;
    const activeActivities = {
      "file.read": null,
      "file.write": null,
      "shell.exec": null,
    };
    let sessionActive = false;
    let turnActive = false;
    const ts = () => new Date().toLocaleTimeString();
    const uid = (prefix) =>
      prefix + "_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
    const log = (msg) => {
      const el = document.getElementById("log");
      el.textContent += `[${ts()}] ${msg}\n`;
      el.scrollTop = el.scrollHeight;
    };
    const getSessionId = () => document.getElementById("sessionIdInput").value.trim() || "simulator";
    const getTurnId = () => document.getElementById("turnIdInput").value.trim() || "turn_1";
    const refreshToggleLabels = () => {
      document.getElementById("readToggleBtn").textContent = activeActivities["file.read"] ? "Stop Read" : "Start Read";
      document.getElementById("writeToggleBtn").textContent = activeActivities["file.write"] ? "Stop Write" : "Start Write";
      document.getElementById("executeToggleBtn").textContent = activeActivities["shell.exec"] ? "Stop Execute" : "Start Execute";
      document.getElementById("sessionToggleBtn").textContent = sessionActive ? "Session End" : "Session Start";
      document.getElementById("turnToggleBtn").textContent = turnActive ? "Turn End" : "Turn Start";
    };
    const setEnabled = (connected, text = connected ? "connected" : "disconnected") => {
      const buttonIds = [
        "faceBtn",
        "textBtn",
        "readToggleBtn",
        "writeToggleBtn",
        "executeToggleBtn",
        "sessionToggleBtn",
        "turnToggleBtn",
      ];
      buttonIds.forEach((id) => {
        document.getElementById(id).disabled = !connected;
      });
      if (!connected) {
        activeActivities["file.read"] = null;
        activeActivities["file.write"] = null;
        activeActivities["shell.exec"] = null;
        sessionActive = false;
        turnActive = false;
      }
      refreshToggleLabels();
      document.getElementById("connectBtn").textContent = connected ? "Disconnect" : "Connect";
      document.getElementById("status").classList.toggle("connected", connected);
      document.getElementById("statusText").textContent = text;
    };
    const sendMode = (mode) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log("WebSocket is not connected.");
        return;
      }
      const payload = { type: "config_change", display_mode: mode };
      ws.send(JSON.stringify(payload));
      log(">> " + JSON.stringify(payload));
    };
    const sendAgentEvent = (event, sessionId = getSessionId(), turnId = getTurnId()) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log("WebSocket is not connected.");
        return;
      }
      const payload = {
        type: "emit_agent_event",
        agent: "simulator",
        session_id: sessionId,
        turn_id: turnId,
        event,
      };
      ws.send(JSON.stringify(payload));
      log(">> " + JSON.stringify(payload));
    };
    const startActivity = (kind, tool, summary) => {
      const activity = { id: uid("act"), kind, tool, summary };
      activeActivities[kind] = activity;
      sendAgentEvent({ kind: "activity.started", activity });
      refreshToggleLabels();
    };
    const stopActivity = (kind, fallbackTool, fallbackSummary) => {
      const activity = activeActivities[kind] || { id: uid("act"), kind, tool: fallbackTool, summary: fallbackSummary };
      activeActivities[kind] = null;
      sendAgentEvent({ kind: "activity.finished", activity });
      refreshToggleLabels();
    };

    document.getElementById("connectBtn").addEventListener("click", () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.close(1000, "manual disconnect");
        return;
      }
      const url = document.getElementById("wsUrl").value.trim();
      setEnabled(false, "connecting...");
      try {
        ws = new WebSocket(url);
      } catch (err) {
        log("Invalid websocket URL: " + (err?.message || String(err)));
        setEnabled(false);
        return;
      }
      ws.onopen = () => {
        log("Connected: " + url);
        setEnabled(true);
      };
      ws.onclose = (ev) => {
        log("Disconnected (" + ev.code + (ev.reason ? ", " + ev.reason : "") + ")");
        setEnabled(false);
      };
      ws.onerror = () => log("WebSocket error");
      ws.onmessage = (ev) => log("<< " + ev.data);
    });

    document.getElementById("faceBtn").addEventListener("click", () => sendMode("face"));
    document.getElementById("textBtn").addEventListener("click", () => sendMode("text"));
    document.getElementById("readToggleBtn").addEventListener("click", () => {
      if (activeActivities["file.read"]) {
        stopActivity("file.read", "Read", "Read file");
      } else {
        startActivity("file.read", "Read", "Read file");
      }
    });
    document.getElementById("writeToggleBtn").addEventListener("click", () => {
      if (activeActivities["file.write"]) {
        stopActivity("file.write", "Edit", "Write file");
      } else {
        startActivity("file.write", "Edit", "Write file");
      }
    });
    document.getElementById("executeToggleBtn").addEventListener("click", () => {
      if (activeActivities["shell.exec"]) {
        stopActivity("shell.exec", "Bash", "Run command");
      } else {
        startActivity("shell.exec", "Bash", "Run command");
      }
    });
    document.getElementById("sessionToggleBtn").addEventListener("click", () => {
      if (sessionActive) {
        sendAgentEvent({ kind: "session.ended", cause: "unknown" }, getSessionId(), undefined);
        sessionActive = false;
        turnActive = false;
      } else {
        sendAgentEvent({ kind: "session.started", cause: "startup" }, getSessionId(), undefined);
        sessionActive = true;
      }
      refreshToggleLabels();
    });
    document.getElementById("turnToggleBtn").addEventListener("click", () => {
      if (turnActive) {
        sendAgentEvent({ kind: "turn.ended", cause: "completed" });
        turnActive = false;
      } else {
        sendAgentEvent({ kind: "turn.started", prompt: "Manual control" });
        turnActive = true;
      }
      refreshToggleLabels();
    });
    setEnabled(false);

    // ---- Log replay ----
    let replayTimers = [];
    let replayLoaded = null;

    const sendRawAgentEvent = (agent, sessionId, turnId, event) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log("WebSocket is not connected.");
        return;
      }
      const payload = {
        type: "emit_agent_event",
        agent: agent || "simulator",
        session_id: sessionId,
        turn_id: turnId,
        event,
      };
      ws.send(JSON.stringify(payload));
      log(">> " + JSON.stringify(payload));
    };

    const cancelReplay = () => {
      replayTimers.forEach((t) => clearTimeout(t));
      replayTimers = [];
      document.getElementById("stopLogBtn").disabled = true;
    };

    const dropZone = document.getElementById("dropZone");

    const loadLogFile = async (file) => {
      if (!file) {
        replayLoaded = null;
        document.getElementById("playLogBtn").disabled = true;
        dropZone.classList.remove("loaded");
        dropZone.textContent = "Drop a log file here, or click to choose";
        return;
      }
      const text = await file.text();
      const entries = [];
      for (const line of text.split(/\r?\n/)) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        try {
          entries.push(JSON.parse(trimmed));
        } catch (err) {
          log("Skipped bad line: " + err.message);
        }
      }
      if (entries.length === 0) {
        log("No valid entries in log file.");
        replayLoaded = null;
        document.getElementById("playLogBtn").disabled = true;
        dropZone.classList.remove("loaded");
        dropZone.textContent = "Drop a log file here, or click to choose";
        return;
      }
      replayLoaded = entries;
      document.getElementById("playLogBtn").disabled = false;
      dropZone.classList.add("loaded");
      dropZone.textContent = `${file.name} — ${entries.length} entries`;
      log(`Loaded ${entries.length} entries from ${file.name}`);
    };

    document.getElementById("logFile").addEventListener("change", (ev) => {
      loadLogFile(ev.target.files && ev.target.files[0]);
    });

    dropZone.addEventListener("click", () => document.getElementById("logFile").click());

    ["dragenter", "dragover"].forEach((evt) => {
      dropZone.addEventListener(evt, (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        dropZone.classList.add("dragging");
      });
    });
    ["dragleave", "dragend"].forEach((evt) => {
      dropZone.addEventListener(evt, (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        dropZone.classList.remove("dragging");
      });
    });
    dropZone.addEventListener("drop", (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      dropZone.classList.remove("dragging");
      const file = ev.dataTransfer && ev.dataTransfer.files && ev.dataTransfer.files[0];
      if (file) loadLogFile(file);
    });

    // Block default browser file-drop behavior across the page so a missed drop
    // doesn't navigate away from the control UI.
    window.addEventListener("dragover", (ev) => ev.preventDefault());
    window.addEventListener("drop", (ev) => ev.preventDefault());

    document.getElementById("playLogBtn").addEventListener("click", () => {
      if (!replayLoaded || replayLoaded.length === 0) return;
      cancelReplay();
      const speed = Math.max(0.1, parseFloat(document.getElementById("speedInput").value) || 1);
      const baseTs = replayLoaded[0].ts;
      const startWall = performance.now();
      log(`Replaying ${replayLoaded.length} entries at ${speed}x ...`);
      document.getElementById("stopLogBtn").disabled = false;

      replayLoaded.forEach((entry, i) => {
        const offset = (entry.ts - baseTs) / speed;
        const t = setTimeout(() => {
          const parsed = Array.isArray(entry.parsed) ? entry.parsed : [];
          if (parsed.length === 0) {
            log(`(skip) entry #${i} hook_type=${entry.hook_type} no parsed events`);
          } else {
            for (const pe of parsed) {
              if (!pe || !pe.event) continue;
              sendRawAgentEvent(entry.agent, pe.session_id, pe.turn_id, pe.event);
            }
          }
          if (i === replayLoaded.length - 1) {
            log("Replay finished.");
            document.getElementById("stopLogBtn").disabled = true;
          }
        }, offset);
        replayTimers.push(t);
      });
    });

    document.getElementById("stopLogBtn").addEventListener("click", () => {
      cancelReplay();
      log("Replay stopped.");
    });
  </script>
</body>
</html>
